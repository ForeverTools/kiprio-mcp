# Smithery configuration — https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      kiprioApiKey:
        type: string
        description: "Optional kiprio.com API key. Free tier (100 req/day/tool) works without one."
  commandFunction:
    |-
    config => ({ command: "uvx", args: ["kiprio-mcp"], env: config.kiprioApiKey ? { KIPRIO_API_KEY: config.kiprioApiKey } : {} })
